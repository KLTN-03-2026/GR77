services:
  postgres:
    image: postgres:15
    container_name: kindlink_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kindlink
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d kindlink" ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kindlink_api
    restart: always
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kindlink?schema=public
    ports:
      - "3001:3000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: pnpm run start:dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: {}
